name: gate

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      # The makefile runs under zsh (SHELL := /bin/zsh).
      - run: sudo apt-get update -q && sudo apt-get install -y -q zsh

      # Poetry before setup-python so its dependency cache can key off the lock.
      - run: pipx install poetry
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
          cache: poetry
      - run: poetry install

      # The gate is defined once, in the makefile — CI just runs it.
      # `typecheck` joins once the pre-existing mypy errors are paid down.
      - run: make check
